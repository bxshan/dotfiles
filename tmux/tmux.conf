# ==============================================================================
# GENERAL SETTINGS
# ==============================================================================
# Set prefix to backtick (`)
unbind C-b
set-option -g prefix `
bind-key ` send-prefix

# Quality of Life
set -g mouse on
set-option -g allow-rename off
set -g history-limit 10000

# Start window/pane numbering at 1 (to match keyboard)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Always start new sessions in your src directory
attach-session -t . -c /Users/box/Desktop/src

# ==============================================================================
# NAVIGATION & SHORTCUTS
# ==============================================================================
# cycle windows
bind ` next-window

# Reload config with 'r'
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | and - (and stay in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using h,j,k,l
bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

# ==============================================================================
# CMD + 1-9 BRIDGE (For Alacritty)
# ==============================================================================
bind-key -n F13 select-window -t 1
bind-key -n F14 select-window -t 2
bind-key -n F15 select-window -t 3
bind-key -n F16 select-window -t 4
bind-key -n F17 select-window -t 5
bind-key -n F18 select-window -t 6
bind-key -n F19 select-window -t 7
bind-key -n F20 select-window -t 8
bind-key -n F21 select-window -t 9

# ==============================================================================
# GRUVBOX DARK THEME & STATUS LINE
# ==============================================================================
# Ensure 24-bit color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# Global Status Bar Settings
set -g status-position top
set -g status-justify left
set -g status-style 'bg=#282828 fg=#ebdbb2' # Dark background, Light text

# Left Side: Session Name (Gruvbox Blue)
set -g status-left "#[fg=#83a598,bold] #S #[default] "
set -g status-left-length 20

# Right Side: CPU | Battery | Clock
set -g status-right-length 50
set -g status-right-style 'fg=#fabd2f,bg=default'
set -g status-right ' %H:%M:%S '
set -g status-right-length 100
set -g status-right "#[fg=#83a598] CPU #(top -l 1 | grep 'CPU usage' | awk '{print $3}') #[fg=#3c3836]|#[fg=#fe8019] Bat #(pmset -g batt | grep -o '[0-9]\\+%%') #[fg=#3c3836]|#[fg=#fabd2f] %H:%M:%S "

# Window Tabs (Inactive)
setw -g window-status-style 'fg=#928374' # Muted Gray
setw -g window-status-format ' #I:#W '

# Window Tabs (Active)
setw -g window-status-current-style 'fg=#8ec07c,bold,underscore' # Gruvbox Aqua
setw -g window-status-current-format ' #I:#W '

# Pane Borders
set -g pane-border-style 'fg=#3c3836'
set -g pane-active-border-style 'fg=#83a598'

# Clock Mode (Big clock: Prefix + T)
setw -g clock-mode-colour '#fe8019'

# Messages & Copy Mode
set -g message-style 'fg=#282828 bg=#fe8019 bold'
setw -g mode-style 'fg=#282828 bg=#fe8019 bold'
